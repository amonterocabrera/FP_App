<div class="min-h-screen bg-slate-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <div class="flex justify-center">
      <div class="h-12 w-12 bg-primary-600 rounded-lg flex items-center justify-center shadow-lg">
        <svg class="h-8 w-8 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
        </svg>
      </div>
    </div>
    <h2 class="mt-6 text-center text-3xl font-extrabold text-slate-900 tracking-tight">
      GestionElectoral <span class="text-primary-600">Portal</span>
    </h2>
    <p class="mt-2 text-center text-sm text-slate-600">
      Acceso Administrativo
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow-xl sm:rounded-xl sm:px-10 border border-slate-100">
      <form class="space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        
        <!-- Error Alert -->
        <div *ngIf="error" class="rounded-md bg-red-50 p-4 border border-red-200">
          <div class="flex">
            <div class="flex-shrink-0">
              <!-- Heroicon name: solid/x-circle -->
              <svg class="h-5 w-5 text-red-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
              </svg>
            </div>
            <div class="ml-3">
              <h3 class="text-sm font-medium text-red-800">
                Error de Autenticación
              </h3>
              <div class="mt-2 text-sm text-red-700">
                <p>{{ error }}</p>
              </div>
            </div>
          </div>
        </div>

        <div>
          <label for="email" class="input-label"> Correo Electrónico </label>
          <div class="mt-1">
            <input id="email" formControlName="email" type="email" autocomplete="email" required class="input-field" 
              [ngClass]="{ 'border-red-300 focus:border-red-500 focus:ring-red-500': submitted && f['email'].errors }">
          </div>
          <div *ngIf="submitted && f['email'].errors" class="mt-1 text-sm text-red-600">
            <div *ngIf="f['email'].errors['required']">El email es requerido</div>
            <div *ngIf="f['email'].errors['email']">El formato debe ser válido</div>
          </div>
        </div>

        <div>
           <label for="password" class="input-label"> Contraseña </label>
          <div class="mt-1">
            <input id="password" formControlName="password" type="password" autocomplete="current-password" required class="input-field"
               [ngClass]="{ 'border-red-300 focus:border-red-500 focus:ring-red-500': submitted && f['password'].errors }">
          </div>
           <div *ngIf="submitted && f['password'].errors" class="mt-1 text-sm text-red-600">
            <div *ngIf="f['password'].errors['required']">La contraseña es requerida</div>
          </div>
        </div>

        <div class="flex items-center justify-between">
          <div class="flex items-center">
            <input id="rememberMe" formControlName="rememberMe" type="checkbox" class="h-4 w-4 text-primary-600 focus:ring-primary-500 border-slate-300 rounded">
            <label for="rememberMe" class="ml-2 block text-sm text-slate-900">
              Recordarme
            </label>
          </div>

          <div class="text-sm">
            <a href="#" class="font-medium text-primary-600 hover:text-primary-500">
              ¿Olvidaste tu contraseña?
            </a>
          </div>
        </div>

        <div>
          <button type="submit" [disabled]="loading" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-all duration-200">
            <svg *ngIf="loading" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span *ngIf="!loading">Iniciar Sesión</span>
            <span *ngIf="loading">Validando...</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

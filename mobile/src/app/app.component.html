<ion-app>
  <ion-split-pane contentId="main-content" [when]="(isLoggedIn && !isHomePage) ? 'lg' : false">

    <!-- ═══ SIDE MENU ═══════════════════════════════════════════════════════ -->
    <ion-menu contentId="main-content" type="overlay" class="institutional-menu"
              [disabled]="!isLoggedIn || isHomePage" menuId="main-menu">

      <!-- User profile card -->
      <ion-header class="ion-no-border">
        <ion-toolbar class="menu-header-toolbar">
          <div class="menu-user-card">

            <!-- Avatar with edit overlay -->
            <div class="menu-avatar-wrapper">
              <ion-avatar class="menu-avatar">
                <img src="https://i.pravatar.cc/150?img=11" alt="avatar" />
              </ion-avatar>
              <button class="avatar-edit-btn" aria-label="Cambiar foto">
                <ion-icon name="camera-outline"></ion-icon>
              </button>
              <div class="online-dot"></div>
            </div>

            <!-- User name & email -->
            <div class="menu-user-info">
              <h2 class="menu-user-name">
                {{ currentUser?.nombre }} {{ currentUser?.apellido }}
              </h2>
              <p class="menu-user-email">{{ currentUser?.email }}</p>
              <span class="menu-user-role">Administrador</span>
            </div>

          </div>
        </ion-toolbar>
      </ion-header>

      <ion-content class="menu-content">
        <ion-list lines="none" class="nav-list">

          <!-- Dashboard -->
          <ion-menu-toggle auto-hide="false">
            <ion-item routerDirection="root" routerLink="/dashboard"
                      routerLinkActive="selected" class="nav-item">
              <ion-icon slot="start" name="grid-outline"></ion-icon>
              <ion-label>Dashboard Central</ion-label>
            </ion-item>
          </ion-menu-toggle>
          <ion-menu-toggle auto-hide="false">
            <ion-item routerDirection="root" routerLink="/personas"
                      routerLinkActive="selected" class="nav-item">
              <ion-icon slot="start" name="people-outline"></ion-icon>
              <ion-label>Gestión de Personas</ion-label>
            </ion-item>
          </ion-menu-toggle>
          <!-- Dynamic modules -->
          <div class="menu-divider" *ngIf="modulos && modulos.length > 0">
            <span>MÓDULOS DEL SISTEMA</span>
          </div>

          <ion-menu-toggle auto-hide="false" *ngFor="let m of modulos">
            <ion-item routerDirection="root" [routerLink]="m.ruta"
                      routerLinkActive="selected" class="nav-item">
              <ion-icon slot="start" [name]="m.icono || fallbackIcon"></ion-icon>
              <ion-label>{{ m.nombre }}</ion-label>
            </ion-item>
          </ion-menu-toggle>

          <!-- ── Profile section ──────────────────────────────────────────── -->
          <div class="menu-divider">
            <span>MI PERFIL</span>
          </div>

          <ion-menu-toggle auto-hide="false">
            <ion-item button class="nav-item" detail="false">
              <ion-icon slot="start" name="person-outline"></ion-icon>
              <ion-label>Datos Personales</ion-label>
              <ion-icon slot="end" name="chevron-forward-outline" class="nav-chevron"></ion-icon>
            </ion-item>
          </ion-menu-toggle>

          <ion-menu-toggle auto-hide="false">
            <ion-item button class="nav-item" detail="false">
              <ion-icon slot="start" name="call-outline"></ion-icon>
              <ion-label>Contacto</ion-label>
              <ion-icon slot="end" name="chevron-forward-outline" class="nav-chevron"></ion-icon>
            </ion-item>
          </ion-menu-toggle>

          <ion-menu-toggle auto-hide="false">
            <ion-item button class="nav-item" detail="false">
              <ion-icon slot="start" name="mail-outline"></ion-icon>
              <ion-label>Correo Electrónico</ion-label>
              <ion-icon slot="end" name="chevron-forward-outline" class="nav-chevron"></ion-icon>
            </ion-item>
          </ion-menu-toggle>

          <ion-menu-toggle auto-hide="false">
            <ion-item button class="nav-item" detail="false">
              <ion-icon slot="start" name="lock-closed-outline"></ion-icon>
              <ion-label>Cambiar Contraseña</ion-label>
              <ion-icon slot="end" name="chevron-forward-outline" class="nav-chevron"></ion-icon>
            </ion-item>
          </ion-menu-toggle>

        </ion-list>
      </ion-content>

      <!-- Footer: logout -->
      <div class="menu-footer">
        <ion-item lines="none" button (click)="logout()" class="nav-item logout-item">
          <ion-icon slot="start" name="log-out-outline"></ion-icon>
          <ion-label>Cerrar Sesión</ion-label>
        </ion-item>
      </div>

    </ion-menu>

    <!-- ═══ MAIN CONTENT OUTLET ════════════════════════════════════════════ -->
    <ion-router-outlet id="main-content"
                       [class.authenticated-outlet]="isLoggedIn">
    </ion-router-outlet>

  </ion-split-pane>


</ion-app>

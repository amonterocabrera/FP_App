<ion-header class="ion-no-border">
  <ion-toolbar color="primary" style="--background: #0A2612; color: white;">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title style="font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px;">GESTIÓN DE MÓDULOS</ion-title>
  </ion-toolbar>
  <ion-toolbar style="--background: #0A2612; padding-bottom: 5px;">
    <ion-searchbar 
      (ionInput)="onSearchChange($event)" 
      placeholder="Buscar por nombre o ruta..."
      animated="true"
      color="light">
    </ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content style="--background: #F7FAF8;">
  <ion-refresher slot="fixed" (ionRefresh)="loadModulos($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>
  
  <ion-list *ngIf="!isLoading" lines="full" style="background: transparent;">
    <ion-item-sliding *ngFor="let m of filteredModulos" class="user-item">
      
      <ion-item detail="true" (click)="navigateToEdit(m)" style="--background: #ffffff; margin-bottom: 2px;">
        <ion-avatar slot="start" style="background: #E8F5E9; display: flex; align-items: center; justify-content: center; color: #00A650;">
          <ion-icon [name]="m.icono || 'cube-outline'" style="font-size: 1.5rem;"></ion-icon>
        </ion-avatar>
        <ion-label>
          <h2 style="font-family: 'Montserrat', sans-serif; font-weight: 700; color: #11421E;">{{ m.nombre | uppercase }}</h2>
          <p style="font-family: 'Montserrat', sans-serif; font-size: 0.8rem; color: #6C7A70;">Ruta: {{ m.ruta }} • Orden: {{ m.orden }}</p>
          <p style="font-size: 0.75rem; color: #00A650; font-weight: 600;" *ngIf="m.isActive">Activo</p>
          <p style="font-size: 0.75rem; color: #C62828; font-weight: 600;" *ngIf="!m.isActive">Inactivo</p>
        </ion-label>
      </ion-item>

      <ion-item-options side="end">
        <ion-item-option color="danger" (click)="confirmDelete(m)">
          <ion-icon slot="icon-only" name="trash"></ion-icon>
        </ion-item-option>
      </ion-item-options>
      
    </ion-item-sliding>
    
    <div *ngIf="filteredModulos.length === 0" class="empty-state" style="text-align: center; padding: 40px 20px; color: #6C7A70;">
      <ion-icon name="cube-outline" style="font-size: 4rem; color: #00A650; opacity: 0.5;"></ion-icon>
      <h3 style="font-family: 'Montserrat', sans-serif; font-weight: 600; margin-top: 15px;">No hay módulos</h3>
      <p style="font-size: 0.9rem;">Agrega el primer módulo conectando el sistema.</p>
    </div>
  </ion-list>

  <!-- Skeleton View -->
  <ion-list *ngIf="isLoading" style="background: transparent;">
    <ion-item *ngFor="let i of [1,2,3]" style="--background: #ffffff; margin-bottom: 2px;">
      <ion-avatar slot="start"><ion-skeleton-text animated></ion-skeleton-text></ion-avatar>
      <ion-label>
        <h3><ion-skeleton-text animated style="width: 60%"></ion-skeleton-text></h3>
        <p><ion-skeleton-text animated style="width: 40%"></ion-skeleton-text></p>
      </ion-label>
    </ion-item>
  </ion-list>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed" style="margin-bottom: 20px; margin-right: 10px;">
    <ion-fab-button style="--background: #00A650; --color: white; --box-shadow: 0 4px 15px rgba(0, 166, 80, 0.4);" (click)="navigateToAdd()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>

</ion-content>

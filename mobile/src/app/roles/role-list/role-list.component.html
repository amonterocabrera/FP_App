<ion-header class="ion-no-border">
  <ion-toolbar color="primary" style="--background: #0A2612; color: white;">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title style="font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px;">GESTIÓN DE ROLES</ion-title>
  </ion-toolbar>
  <ion-toolbar style="--background: #0A2612; padding-bottom: 5px;">
    <ion-searchbar 
      (ionInput)="onSearchChange($event)" 
      placeholder="Buscar rol por nombre..."
      animated="true"
      color="light">
    </ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content style="--background: #F7FAF8;">
  <ion-refresher slot="fixed" (ionRefresh)="loadRoles($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>
  
  <ion-list *ngIf="!isLoading" lines="full" style="background: transparent;">
    <ion-item-sliding *ngFor="let role of filteredRoles">
      
      <ion-item detail="true" (click)="navigateToEdit(role)" style="--background: #ffffff; margin-bottom: 2px;">
        <ion-avatar slot="start" style="background: #E8F5E9; display: flex; align-items: center; justify-content: center; color: #00A650;">
          <ion-icon name="shield-checkmark-outline" style="font-size: 1.4rem;"></ion-icon>
        </ion-avatar>
        <ion-label>
          <h2 style="font-family: 'Montserrat', sans-serif; font-weight: 700; color: #11421E;">{{ role.name }}</h2>
          <p style="font-family: 'Montserrat', sans-serif; font-size: 0.8rem; color: #6C7A70;">{{ role.descripcion || 'Sin descripción' }}</p>
          <ion-badge color="success" *ngIf="role.isActive" style="margin-top: 5px;">Activo</ion-badge>
          <ion-badge color="danger" *ngIf="!role.isActive" style="margin-top: 5px;">Inactivo</ion-badge>
        </ion-label>
      </ion-item>

      <ion-item-options side="end">
        <ion-item-option color="danger" (click)="confirmDelete(role)">
          <ion-icon slot="icon-only" name="trash"></ion-icon>
        </ion-item-option>
      </ion-item-options>
      
    </ion-item-sliding>
    
    <div *ngIf="filteredRoles.length === 0" style="text-align: center; padding: 40px 20px; color: #6C7A70;">
      <ion-icon name="construct-outline" style="font-size: 4rem; color: #00A650; opacity: 0.5;"></ion-icon>
      <h3 style="font-family: 'Montserrat', sans-serif; font-weight: 600; margin-top: 15px;">No hay roles</h3>
      <p style="font-size: 0.9rem;">Agrega grupos de permisos para el sistema.</p>
    </div>
  </ion-list>

  <!-- Skeleton View -->
  <ion-list *ngIf="isLoading" style="background: transparent;">
    <ion-item *ngFor="let i of [1,2,3,4]" style="--background: #ffffff; margin-bottom: 2px;">
      <ion-avatar slot="start"><ion-skeleton-text animated></ion-skeleton-text></ion-avatar>
      <ion-label>
        <h3><ion-skeleton-text animated style="width: 60%"></ion-skeleton-text></h3>
        <p><ion-skeleton-text animated style="width: 40%"></ion-skeleton-text></p>
      </ion-label>
    </ion-item>
  </ion-list>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed" style="margin-bottom: 20px; margin-right: 10px;">
    <ion-fab-button style="--background: #00A650; --color: white; --box-shadow: 0 4px 15px rgba(0, 166, 80, 0.4);" (click)="navigateToAdd()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>

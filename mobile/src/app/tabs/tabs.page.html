<ion-tabs>

  <!-- ── Tab content area — Ionic manages scroll/safe-area automatically ──── -->
  <!-- ion-router-outlet is implicit inside ion-tabs, DO NOT add it manually -->

  <!-- ── Bottom tab bar ────────────────────────────────────────────────────── -->
  <ion-tab-bar slot="bottom" class="fp-tab-bar">

    <!-- Inicio -->
    <ion-tab-button tab="dashboard" class="fp-tab-btn">
      <ion-icon name="home-outline"></ion-icon>
      <ion-label>Inicio</ion-label>
    </ion-tab-button>

    <!-- Reportes -->
    <ion-tab-button tab="reportes" class="fp-tab-btn">
      <ion-icon name="bar-chart-outline"></ion-icon>
      <ion-label>Reportes</ion-label>
    </ion-tab-button>

    <!-- FAB Center: Agregar persona -->
    <ion-tab-button tab="agregar" class="fp-tab-btn fp-tab-fab">
      <div class="fab-circle">
        <ion-icon name="person-add-outline"></ion-icon>
      </div>
      <ion-label>Agregar</ion-label>
    </ion-tab-button>

    <!-- Más opciones -->
    <ion-tab-button tab="mas" class="fp-tab-btn">
      <ion-icon name="grid-outline"></ion-icon>
      <ion-label>Más</ion-label>
    </ion-tab-button>

    <!-- Perfil (opens side menu) -->
    <ion-tab-button tab="perfil" class="fp-tab-btn">
      <ion-icon name="person-circle-outline"></ion-icon>
      <ion-label>Perfil</ion-label>
    </ion-tab-button>

  </ion-tab-bar>

</ion-tabs>
